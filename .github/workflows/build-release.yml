name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm ci
      - uses: android-actions/setup-android@v3
      - run: |
          mkdir -p android/app/src/main/assets
          cd android/app
          keytool -genkeypair -v -storetype PKCS12 -keystore release.keystore -alias lenovo -keyalg RSA -keysize 2048 -validity 10000 -storepass lenovo2024 -keypass lenovo2024 -dname "CN=Lenovo"
      - uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.0.1
          arguments: assembleRelease
          build-root-directory: android
      - run: |
          cd android/app/build/outputs/apk/release
          for f in app-*.apk; do mv "$f" "lenovo-wifi-manager-${{ github.ref_name }}.apk" 2>/dev/null || true; done
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint || true
      - run: |
          7z a windows-source.zip src windows package.json index.js App.tsx tsconfig.json
      - uses: actions/upload-artifact@v4
        with:
          name: windows-source
          path: windows-source.zip

  release:
    name: Create Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: ls -R
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            android-apk/*.apk
            windows-source/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
