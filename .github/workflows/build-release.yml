name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install dependencies
        run: npm ci

      - name: Generate signing key
        working-directory: android/app
        run: |
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore release.keystore \
            -alias lenovo-wifi-manager \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass lenovo2024 \
            -keypass lenovo2024 \
            -dname "CN=Lenovo WiFi Manager, OU=Lenovo, O=Lenovo, L=Beijing, ST=Beijing, C=CN"

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK files
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-universal-release.apk release/联想WiFi管理-安卓通用版-${{ github.event.inputs.version || github.ref_name }}.apk
          cp android/app/build/outputs/apk/release/app-arm64-v8a-release.apk release/联想WiFi管理-华为P60Pro版-${{ github.event.inputs.version || github.ref_name }}.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: release/*.apk

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (x64)
        run: npx react-native run-windows --arch x64 --release --logging

      - name: Package MSIX
        working-directory: windows
        run: |
          msbuild LenovoWiFiManager.sln /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Always /p:AppxBundlePlatforms="x64" /p:UapAppxPackageBuildMode=StoreUpload

      - name: Collect Windows packages
        run: |
          mkdir -p release
          Get-ChildItem -Path "windows/LenovoWiFiManager/AppPackages" -Recurse -Include *.msix, *.appx | ForEach-Object {
            Copy-Item $_.FullName -Destination "release/联想WiFi管理-Windows版-${{ github.event.inputs.version || github.ref_name }}.msix"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v3
        with:
          name: windows-msix
          path: release/*.msix

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
