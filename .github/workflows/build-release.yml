name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: 1.0.0)'
        required: true
        default: '1.0.0'

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  # ==========================================
  # Android 构建 - 华为 P60 Pro (ARM64)
  # ==========================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.0

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      - name: Install dependencies
        run: npm ci

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Generate Release Keystore
        run: |
          cd android/app
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore release.keystore \
            -alias lenovo-wifi-manager \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass lenovo2024 \
            -keypass lenovo2024 \
            -dname "CN=Lenovo, OU=WiFi Manager, O=Lenovo, L=Beijing, ST=Beijing, C=CN"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.0.1

      - name: Build Android Release APK
        run: |
          cd android
          gradle assembleRelease --no-daemon
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}

      - name: List APK files
        run: |
          echo "=== Generated APK files ==="
          find android/app/build/outputs/apk/release -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          ls -lh android/app/build/outputs/apk/release/ 2>/dev/null || echo "Directory not found"

      - name: Rename APK files
        run: |
          cd android/app/build/outputs/apk/release 2>/dev/null || exit 0
          
          # 通用版本
          if [ -f "app-universal-release.apk" ]; then
            mv app-universal-release.apk "lenovo-wifi-manager-v${VERSION}-universal.apk"
          fi
          
          # 华为 P60 Pro 专用 (ARM64)
          if [ -f "app-arm64-v8a-release.apk" ]; then
            mv app-arm64-v8a-release.apk "lenovo-wifi-manager-v${VERSION}-huawei-p60pro.apk"
          fi
          
          # ARMv7
          if [ -f "app-armeabi-v7a-release.apk" ]; then
            mv app-armeabi-v7a-release.apk "lenovo-wifi-manager-v${VERSION}-armv7.apk"
          fi
          
          # x86_64
          if [ -f "app-x86_64-release.apk" ]; then
            mv app-x86_64-release.apk "lenovo-wifi-manager-v${VERSION}-x86_64.apk"
          fi
          
          ls -lh

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ env.VERSION }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ==========================================
  # Windows 构建 - MSIX 安装包
  # ==========================================
  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install dependencies
        run: npm ci

      - name: Install Windows dependencies
        run: |
          npm run windows -- --logging 2>&1 || echo "Initial setup may fail, continuing..."
        continue-on-error: true

      - name: Create Bundle Directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "windows/LenovoWiFiManager/Bundle"

      - name: Bundle Windows
        run: |
          npx react-native bundle --platform windows --dev false --entry-file index.js --bundle-output windows/LenovoWiFiManager/Bundle/index.windows.bundle --assets-dest windows/LenovoWiFiManager/Bundle

      - name: Restore NuGet Packages
        run: |
          nuget restore windows/lenovo-wifi-manager.sln

      - name: Build Windows Release (x64)
        run: |
          msbuild windows/lenovo-wifi-manager.sln /p:Configuration=Release /p:Platform=x64 /p:PackageCertificateKeyFile="" /p:PackageCertificatePassword="" /p:AppxPackageSigningEnabled=false

      - name: Package Windows App
        shell: pwsh
        run: |
          $releasePath = "windows/LenovoWiFiManager/Release/x64"
          if (Test-Path $releasePath) {
            $destPath = "lenovo-wifi-manager-v${env:VERSION}-portable"
            New-Item -ItemType Directory -Force -Path $destPath
            
            # 复制可执行文件和资源
            Copy-Item "$releasePath/*" -Destination $destPath -Recurse -Force
            
            # 创建启动脚本
            @"
@echo off
echo Starting Lenovo WiFi Manager...
start LenovoWiFiManager.exe
"@ | Set-Content -Path "$destPath/Start.bat"
            
            # 创建 README
            @"
Lenovo WiFi Manager v${env:VERSION}
========================

Portable Version

Usage:
1. Run Start.bat to launch the application
2. Or run LenovoWiFiManager.exe directly

Requirements:
- Windows 10 version 1903+ or Windows 11
- Visual C++ Redistributables (usually pre-installed)
"@ | Set-Content -Path "$destPath/README.txt"
            
            # 压缩为 ZIP
            Compress-Archive -Path $destPath -DestinationPath "lenovo-wifi-manager-v${env:VERSION}-portable.zip" -Force
            
            # 移动回项目目录
            Move-Item "lenovo-wifi-manager-v${env:VERSION}-portable.zip" "windows/LenovoWiFiManager/" -Force
          }

      - name: List Windows Outputs
        shell: pwsh
        run: |
          Get-ChildItem -Path "windows/LenovoWiFiManager" -Filter "lenovo-wifi-manager*" -Recurse | ForEach-Object {
            Write-Host "$($_.FullName) - $($_.Length) bytes"
          }

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-${{ env.VERSION }}
          path: |
            windows/LenovoWiFiManager/*.zip
          retention-days: 30

  # ==========================================
  # 发布 Release
  # ==========================================
  create-release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ env.VERSION }}
          path: ./artifacts/android/

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-app-${{ env.VERSION }}
          path: ./artifacts/windows/

      - name: List Artifacts
        run: |
          echo "=== Android Artifacts ==="
          ls -lh ./artifacts/android/ 2>/dev/null || echo "No Android artifacts"
          echo ""
          echo "=== Windows Artifacts ==="
          ls -lh ./artifacts/windows/ 2>/dev/null || echo "No Windows artifacts"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Release ${{ env.VERSION }}"
          tag_name: ${{ github.ref_name || format('v{0}', env.VERSION) }}
          body: |
            ## 🎉 Lenovo WiFi Manager ${{ env.VERSION }}

            ### 📱 Android 版本
            - **华为 P60 Pro 专用** (ARM64): `lenovo-wifi-manager-v${{ env.VERSION }}-huawei-p60pro.apk`
            - **通用版本**: `lenovo-wifi-manager-v${{ env.VERSION }}-universal.apk`

            #### 安装说明
            1. 下载对应版本的 APK
            2. 在手机上允许"安装未知来源应用"
            3. 安装 APK 文件

            ### 💻 Windows 版本
            - **便携版**: `lenovo-wifi-manager-v${{ env.VERSION }}-portable.zip`

            #### 安装说明
            1. 下载 ZIP 文件
            2. 解压到任意位置
            3. 运行 `Start.bat` 或 `LenovoWiFiManager.exe`

            ### 📋 系统要求
            - Android: Android 8.0+ (API 26+)
            - Windows: Windows 10 version 1903+ 或 Windows 11
          files: |
            ./artifacts/android/*.apk
            ./artifacts/windows/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
