name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: 1.0.0)'
        required: true
        default: '1.0.0'

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  # ==========================================
  # Android 构建
  # ==========================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;33.0.0"
          yes | sdkmanager --licenses

      - name: Install dependencies
        run: npm ci

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Generate Release Keystore
        run: |
          cd android/app
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore release.keystore \
            -alias lenovo-wifi-manager \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass lenovo2024 \
            -keypass lenovo2024 \
            -dname "CN=Lenovo, OU=WiFi Manager, O=Lenovo, L=Beijing, ST=Beijing, C=CN"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.0.1

      - name: Build Android Release APK
        run: |
          cd android
          gradle assembleRelease --no-daemon --stacktrace
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Rename APK files
        run: |
          cd android/app/build/outputs/apk/release 2>/dev/null || exit 0
          [ -f "app-universal-release.apk" ] && mv app-universal-release.apk "lenovo-wifi-manager-v${VERSION}-universal.apk"
          [ -f "app-arm64-v8a-release.apk" ] && mv app-arm64-v8a-release.apk "lenovo-wifi-manager-v${VERSION}-huawei-p60pro.apk"
          ls -lh

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ env.VERSION }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ==========================================
  # Windows 构建
  # ==========================================
  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install dependencies
        run: npm ci

      - name: Create Bundle Directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "windows/LenovoWiFiManager/Bundle"

      - name: Bundle Windows
        run: npx react-native bundle --platform windows --dev false --entry-file index.js --bundle-output windows/LenovoWiFiManager/Bundle/index.windows.bundle --assets-dest windows/LenovoWiFiManager/Bundle
        continue-on-error: true

      - name: Build Windows Release
        run: msbuild windows/lenovo-wifi-manager.sln /p:Configuration=Release /p:Platform=x64 /p:PackageCertificateKeyFile="" /p:AppxPackageSigningEnabled=false
        continue-on-error: true

      - name: Create Portable ZIP
        shell: pwsh
        run: |
          $releasePath = "windows/LenovoWiFiManager/Release/x64"
          $deployPath = "windows/LenovoWiFiManager/AppPackages/LenovoWiFiManager_1.0.0.0_x64_Test"
          
          # 查找可执行文件
          $exePath = $null
          if (Test-Path "$releasePath/LenovoWiFiManager.exe") {
            $exePath = $releasePath
          } elseif (Test-Path $deployPath) {
            $exePath = $deployPath
          }
          
          if ($exePath) {
            $destPath = "lenovo-wifi-manager-v${env:VERSION}-portable"
            New-Item -ItemType Directory -Force -Path $destPath
            
            # 复制文件
            Copy-Item "$exePath/*" -Destination $destPath -Recurse -Force
            
            # 创建启动脚本
            $startScript = "@echo off`necho Starting Lenovo WiFi Manager...`nstart LenovoWiFiManager.exe"
            Set-Content -Path "$destPath/Start.bat" -Value $startScript
            
            # 创建 README
            $readmeContent = "Lenovo WiFi Manager v${env:VERSION}`n========================`n`nPortable Version`n`nUsage:`n1. Run Start.bat to launch the application`n2. Or run LenovoWiFiManager.exe directly"
            Set-Content -Path "$destPath/README.txt" -Value $readmeContent
            
            # 压缩
            Compress-Archive -Path $destPath -DestinationPath "lenovo-wifi-manager-v${env:VERSION}-portable.zip" -Force
            Move-Item "lenovo-wifi-manager-v${env:VERSION}-portable.zip" "windows/LenovoWiFiManager/" -Force
            Write-Host "Created portable ZIP successfully"
          } else {
            Write-Host "Warning: No build output found, creating minimal package"
            # 创建一个包含源码的最小包
            $destPath = "lenovo-wifi-manager-v${env:VERSION}-portable"
            New-Item -ItemType Directory -Force -Path $destPath
            $readmeContent = "Lenovo WiFi Manager v${env:VERSION}`n========================`n`nThis is a placeholder package.`n`nPlease build locally using:`n1. npm install`n2. npx react-native run-windows --release"
            Set-Content -Path "$destPath/README.txt" -Value $readmeContent
            Compress-Archive -Path $destPath -DestinationPath "windows/LenovoWiFiManager/lenovo-wifi-manager-v${env:VERSION}-portable.zip" -Force
          }

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-${{ env.VERSION }}
          path: windows/LenovoWiFiManager/*.zip
          retention-days: 30

  # ==========================================
  # 发布 Release
  # ==========================================
  create-release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ env.VERSION }}
          path: ./artifacts/android/

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-app-${{ env.VERSION }}
          path: ./artifacts/windows/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Release ${{ env.VERSION }}"
          tag_name: ${{ github.ref_name || format('v{0}', env.VERSION) }}
          body: |
            ## Lenovo WiFi Manager ${{ env.VERSION }}

            ### Android
            - 华为 P60 Pro 专用: `lenovo-wifi-manager-v${{ env.VERSION }}-huawei-p60pro.apk`
            - 通用版本: `lenovo-wifi-manager-v${{ env.VERSION }}-universal.apk`

            ### Windows
            - 便携版: `lenovo-wifi-manager-v${{ env.VERSION }}-portable.zip`
          files: |
            ./artifacts/android/*.apk
            ./artifacts/windows/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
