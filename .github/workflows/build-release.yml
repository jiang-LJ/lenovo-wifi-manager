name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true
      
      - name: Install SDK platforms
        run: sdkmanager "platforms;android-33" "build-tools;33.0.0" || true
      
      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets
      
      - name: Generate keystore
        working-directory: android/app
        run: |
          keytool -genkeypair -v -storetype PKCS12 \
            -keystore release.keystore \
            -alias lenovo \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass lenovo2024 -keypass lenovo2024 \
            -dname "CN=Lenovo" || echo "Keystore may exist"
      
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace || gradle assembleRelease --no-daemon --stacktrace
        continue-on-error: true
      
      - name: Check outputs
        run: |
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "No output yet"
          find android -name "*.apk" 2>/dev/null || echo "No APK found"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk
        if: always()

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        continue-on-error: true
      
      - name: Create source package
        run: |
          tar -czvf windows-source.tar.gz src windows package.json index.js App.tsx tsconfig.json README.md 2>nul || 7z a windows-source.zip src windows package.json index.js App.tsx tsconfig.json README.md 2>nul || echo "Packaging failed"
        continue-on-error: true
      
      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: windows-source
          path: |
            windows-source.tar.gz
            windows-source.zip
        if: always()

  release:
    name: Create Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true
      
      - name: List artifacts
        run: ls -R || echo "No artifacts"
        continue-on-error: true
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Lenovo WiFi Manager ${{ github.ref_name }}
            
            Automated build from GitHub Actions.
          files: |
            **/*.apk
            **/*.zip
            **/*.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
