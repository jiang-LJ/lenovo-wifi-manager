name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: 1.0.0)'
        required: true
        default: '1.0.0'

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  # ==========================================
  # Android 构建
  # ==========================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0" || true

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Generate Keystore
        run: |
          cd android/app
          keytool -genkeypair -v -storetype PKCS12 \
            -keystore release.keystore \
            -alias lenovo-wifi-manager \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass lenovo2024 -keypass lenovo2024 \
            -dname "CN=Lenovo, O=Lenovo, L=Beijing, ST=Beijing, C=CN"

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.0.1
          arguments: assembleRelease
          build-root-directory: android

      - name: Rename APK
        run: |
          cd android/app/build/outputs/apk/release
          for f in app-*-release.apk; do
            [ -f "$f" ] || continue
            name=$(echo "$f" | sed 's/app-/lenovo-wifi-manager-v${VERSION}-/' | sed 's/-release//')
            mv "$f" "$name"
          done
          ls -lh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # ==========================================
  # Windows 构建
  # ==========================================
  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install dependencies
        run: npm ci

      - name: Create source package
        shell: pwsh
        run: |
          $dest = "lenovo-wifi-manager-v${env:VERSION}-portable"
          New-Item -ItemType Directory -Force -Path $dest
          
          # 复制项目文件
          Copy-Item -Path "src" -Destination "$dest/src" -Recurse -Force
          Copy-Item -Path "windows" -Destination "$dest/windows" -Recurse -Force
          Copy-Item -Path "package.json" -Destination $dest -Force
          Copy-Item -Path "index.js" -Destination $dest -Force
          Copy-Item -Path "App.tsx" -Destination $dest -Force
          Copy-Item -Path "tsconfig.json" -Destination $dest -Force
          
          # 创建说明文件
          @"
Lenovo WiFi Manager v${env:VERSION}
========================

Windows Portable Version

This package contains the source code and Windows project files.

To build and run:
1. Install Node.js 18+
2. Install Visual Studio 2022 with C++ and UWP workloads
3. Run: npm install
4. Run: npx react-native run-windows --release

Or open windows/lenovo-wifi-manager.sln in Visual Studio and build.
"@ | Set-Content "$dest/README.txt"
          
          # 创建启动脚本
          @"
@echo off
echo Lenovo WiFi Manager v${env:VERSION}
echo ========================
echo.
echo This is a React Native Windows project.
echo Please build using Visual Studio or run: npx react-native run-windows
echo.
echo Prerequisites:
echo - Node.js 18+
echo - Visual Studio 2022 with UWP support
echo.
pause
"@ | Set-Content "$dest/Start.bat"
          
          Compress-Archive -Path $dest -DestinationPath "windows-portable.zip" -Force
          Move-Item "windows-portable.zip" "lenovo-wifi-manager-v${env:VERSION}-windows.zip" -Force

      - name: Try Build Windows
        shell: pwsh
        run: |
          try {
            # 创建 bundle 目录
            New-Item -ItemType Directory -Force -Path "windows/LenovoWiFiManager/Bundle"
            
            # Bundle JS
            npx react-native bundle --platform windows --dev false --entry-file index.js --bundle-output windows/LenovoWiFiManager/Bundle/index.windows.bundle --assets-dest windows/LenovoWiFiManager/Bundle 2>&1 | Out-Null
            
            # Build
            msbuild windows/lenovo-wifi-manager.sln /p:Configuration=Release /p:Platform=x64 /p:AppxPackageSigningEnabled=false 2>&1 | Out-Null
            
            # 如果成功，复制到压缩包
            $exePath = "windows/LenovoWiFiManager/Release/x64/LenovoWiFiManager.exe"
            if (Test-Path $exePath) {
              Write-Host "Build succeeded!"
              Expand-Archive -Path "lenovo-wifi-manager-v${env:VERSION}-windows.zip" -DestinationPath "temp_extract" -Force
              Copy-Item $exePath "temp_extract/lenovo-wifi-manager-v${env:VERSION}-portable/" -Force
              Compress-Archive -Path "temp_extract/lenovo-wifi-manager-v${env:VERSION}-portable" -DestinationPath "lenovo-wifi-manager-v${env:VERSION}-windows.zip" -Force
              Remove-Item -Recurse -Force "temp_extract" -ErrorAction SilentlyContinue
            }
          } catch {
            Write-Host "Build failed, using source package only"
          }
        continue-on-error: true

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: lenovo-wifi-manager-v*-windows.zip

  # ==========================================
  # 发布 Release
  # ==========================================
  create-release:
    name: Create Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts/

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-app
          path: ./artifacts/

      - name: List files
        run: ls -lhR ./artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ env.VERSION }}"
          body: |
            ## Lenovo WiFi Manager ${{ env.VERSION }}

            ### Android APK
            Download and install on your Android device.

            ### Windows Package
            Contains source code and project files. Build with Visual Studio 2022 or run `npx react-native run-windows`.
          files: ./artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
