name: Build JS Bundles

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-js:
    name: Build JavaScript Bundles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Create source package
        run: |
          mkdir -p output
          zip -r output/lenovo-wifi-manager-source.zip . -x "node_modules/*" ".git/*"

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: source-package
          path: output/*.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: output/*.zip
          body: |
            ## 联想WiFi管理 v${{ github.ref_name }}
            
            ### 构建说明
            此版本包含完整的源代码，需要在本地进行打包。
            
            ### 打包方法
            
            #### 方法1: Docker 打包（推荐）
            ```bash
            docker build -f Dockerfile.android -t lenovo-builder .
            docker run --rm -v "$(pwd)/output:/output" lenovo-builder
            ```
            
            #### 方法2: 本地打包
            1. 安装 Android Studio 或 Visual Studio 2022
            2. 运行 `scripts/build-android.bat` 或 `scripts/build-windows.bat`
            
            ### 安装包
            构建完成后将生成：
            - Android APK (华为 P60 Pro 适用)
            - Windows MSIX/EXE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
